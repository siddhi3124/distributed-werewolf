<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributed Werewolf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Distributed Werewolf</h1>
    <p class="subtitle">Real-time multiplayer Mafia/Werewolf game</p>

    <div id="joinSection" class="card">
      <h2>Create / Join Lobby</h2>

      <input id="nameInput" type="text" placeholder="Enter your name" />
      <input id="roomInput" type="text" placeholder="Room code to join" />

      <div class="row">
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
      </div>
    </div>

    <div id="roomSection" class="card hidden">
      <h2>Room: <span id="roomCodeText">-</span></h2>

      <p>Phase: <b id="phaseText">lobby</b></p>
      <p>You: <b id="myNameText">-</b></p>
      <p>Your Role: <b id="roleText">Not assigned</b></p>
      <p>Winner: <b id="winnerText">-</b></p>

      <h3>Players</h3>
      <ul id="playerList"></ul>

      <button id="startBtn">Start Game</button>

      <hr />

      <h3>Action</h3>
      <select id="targetSelect">
        <option value="">Select target</option>
      </select>

      <div class="row">
        <button id="nightActionBtn">Submit Night Action</button>
        <button id="dayVoteBtn">Submit Day Vote</button>
      </div>

      <h3>Alive Players</h3>
      <ul id="alivePlayersList"></ul>

      <div id="privateBox" class="message">Private updates will appear here.</div>

      <h3>Logs</h3>
      <div id="logsBox" class="logs"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
